name: CI + Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# --- Required GitHub configuration ---------------------------------------------
# Secrets:
#   AZURE_CREDENTIALS  -> service-principal JSON from:
#       az ad sp create-for-rbac --name echo-sre-ci --role contributor \
#         --scopes /subscriptions/<SUB>/resourceGroups/<RG> --sdk-auth
#   GEMINI_API_KEY     -> your Google AI Studio key (injected as a container env var)
# Variables (Settings -> Variables; all optional, defaults shown):
#   AZURE_RESOURCE_GROUP (echo-sre-rg)  AZURE_CONTAINERAPP (echo-sre)
#   AZURE_CONTAINERAPP_ENV (echo-sre-env)  AZURE_ACR_NAME (REQUIRED, globally unique)
#   AZURE_LOCATION (eastus)
# -------------------------------------------------------------------------------

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint-free import + tests (offline, no keys)
        run: pytest -q

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'echo-sre-rg' }}
      CONTAINERAPP_NAME: ${{ vars.AZURE_CONTAINERAPP || 'echo-sre' }}
      CONTAINERAPP_ENV: ${{ vars.AZURE_CONTAINERAPP_ENV || 'echo-sre-env' }}
      ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
      LOCATION: ${{ vars.AZURE_LOCATION || 'eastus' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build image & deploy to Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: Dockerfile
          acrName: ${{ env.ACR_NAME }}
          imageToBuild: ${{ env.ACR_NAME }}.azurecr.io/echo-sre:${{ github.sha }}
          containerAppName: ${{ env.CONTAINERAPP_NAME }}
          containerAppEnvironment: ${{ env.CONTAINERAPP_ENV }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          location: ${{ env.LOCATION }}
          targetPort: 8000
          ingress: external
          environmentVariables: >-
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            ECHO_SRE_BACKEND=synthetic
            ECHO_SRE_PROVIDERS_FILE=config/providers.yaml
            ECHO_SRE_CORS_ORIGINS=https://hello-sharon.dev,http://localhost:5173
