name: CI + Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# --- Required GitHub configuration ---------------------------------------------
# Secrets:
#   AZURE_CREDENTIALS  -> service-principal JSON from:
#       az ad sp create-for-rbac --name echo-sre-ci --role contributor \
#         --scopes /subscriptions/<SUB>/resourceGroups/<RG> --sdk-auth
#   GEMINI_API_KEY     -> your Google AI Studio key (injected as a container env var)
# Variables (Settings -> Variables; all optional, defaults shown):
#   AZURE_RESOURCE_GROUP (echo-sre-rg)  AZURE_CONTAINERAPP (echo-sre)
#   AZURE_CONTAINERAPP_ENV (echo-sre-env)  AZURE_ACR_NAME (REQUIRED, globally unique)
#   AZURE_LOCATION (eastus)
# -------------------------------------------------------------------------------

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint-free import + tests (offline, no keys)
        run: pytest -q

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'echo-sre-rg' }}
      CONTAINERAPP_NAME: ${{ vars.AZURE_CONTAINERAPP || 'echo-sre' }}
      CONTAINERAPP_ENV: ${{ vars.AZURE_CONTAINERAPP_ENV || 'echo-sre-env' }}
      ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
      LOCATION: ${{ vars.AZURE_LOCATION || 'eastus' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure resource group + providers exist
        run: |
          az provider register -n Microsoft.App
          az provider register -n Microsoft.OperationalInsights
          az group create --name "$RESOURCE_GROUP" --location "$LOCATION"

      - name: Install containerapp extension
        run: az extension add --name containerapp --upgrade --only-show-errors

      # Build on the runner and push via `az acr login` (AAD token from the SP, which has
      # the data-plane push role). ACR Tasks (`az acr build`) can't get push creds on this
      # registry, but a direct docker push works — same path that succeeded before.
      - name: Build & push image
        run: |
          az acr login -n "$ACR_NAME"
          docker build -t "$ACR_NAME.azurecr.io/echo-sre:${{ github.sha }}" .
          docker push "$ACR_NAME.azurecr.io/echo-sre:${{ github.sha }}"

      - name: Ensure Container Apps environment
        run: |
          az containerapp env show -n "$CONTAINERAPP_ENV" -g "$RESOURCE_GROUP" -o none 2>/dev/null \
            || az containerapp env create -n "$CONTAINERAPP_ENV" -g "$RESOURCE_GROUP" -l "$LOCATION" -o none

      # The running container app pulls the private image with the registry's admin
      # username/password (a per-registry credential, separate from the SP login). This
      # needs no role assignment or managed-identity perms, which a Contributor SP lacks.
      - name: Deploy container app
        run: |
          IMAGE="$ACR_NAME.azurecr.io/echo-sre:${{ github.sha }}"
          ENV_VARS="GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} ECHO_SRE_BACKEND=synthetic ECHO_SRE_PROVIDERS_FILE=config/providers.yaml ECHO_SRE_CORS_ORIGINS=https://hello-sharon.dev,http://localhost:5173"

          STATE=$(az containerapp show -n "$CONTAINERAPP_NAME" -g "$RESOURCE_GROUP" \
            --query "properties.provisioningState" -o tsv 2>/dev/null || echo Missing)

          # A prior run can leave the app in a Failed state (e.g. it couldn't pull the
          # image). You can't update a Failed app — delete it so we recreate cleanly.
          if [ "$STATE" = "Failed" ]; then
            echo "Existing app is in Failed state — deleting to recreate."
            az containerapp delete -n "$CONTAINERAPP_NAME" -g "$RESOURCE_GROUP" --yes -o none
            STATE=Missing
          fi

          if [ "$STATE" = "Missing" ]; then
            az containerapp create -n "$CONTAINERAPP_NAME" -g "$RESOURCE_GROUP" \
              --environment "$CONTAINERAPP_ENV" --image "$IMAGE" \
              --registry-server "$ACR_NAME.azurecr.io" \
              --registry-username "${{ secrets.ACR_USERNAME }}" --registry-password "${{ secrets.ACR_PASSWORD }}" \
              --ingress external --target-port 8000 \
              --min-replicas 1 --max-replicas 3 \
              --env-vars $ENV_VARS -o none
          else
            az containerapp registry set -n "$CONTAINERAPP_NAME" -g "$RESOURCE_GROUP" \
              --server "$ACR_NAME.azurecr.io" \
              --username "${{ secrets.ACR_USERNAME }}" --password "${{ secrets.ACR_PASSWORD }}" -o none
            az containerapp update -n "$CONTAINERAPP_NAME" -g "$RESOURCE_GROUP" \
              --image "$IMAGE" --set-env-vars $ENV_VARS -o none
          fi

      - name: Show app URL
        run: |
          FQDN=$(az containerapp show -n "$CONTAINERAPP_NAME" -g "$RESOURCE_GROUP" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "ECHO-SRE deployed at: https://$FQDN"
          echo "Set the portfolio's VITE_ECHO_SRE_API to: https://$FQDN"
